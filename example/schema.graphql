schema {
    query: Query
    subscription: Subscription
}

type Query {
    """
    Prints a friendly greeting. This is just a placeholder query to satisfy the requirement that a GraphQL schema must have a query type with at least one field.
    """
    hello: String!
}

type Subscription {
    """
    Emits a tick every second. Stops after count ticks (default: 10).
    """
    ticks(count: Int): Tick!
}

"""
A tick is a single event emitted by the ticks subscription.
It contains the time the tick was emitted and its sequential number.
"""
type Tick {
    "The time the tick was emitted, in RFC3339 format."
    at:     String!

    "The sequential number of the tick."
    number: Int!
}
